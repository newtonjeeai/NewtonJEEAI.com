# ============================================================
# NewtonJEE — Nginx Server Block
# Server: AWS EC2 ap-south-1 (Mumbai)
# Domain: newtonjee.com
# PHP: php8.2-fpm
# ============================================================

server {
    listen 80;
    server_name newtonjee.com www.newtonjee.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name newtonjee.com;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/newtonjee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newtonjee.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Document root ─────────────────────────────────────────
    root /var/www/newtonjee/public;
    index index.php;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/newtonjee.access.log;
    error_log  /var/log/nginx/newtonjee.error.log;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://lh3.googleusercontent.com; frame-src https://www.youtube.com; connect-src 'self';" always;

    # ── PHP front controller ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Block access to sensitive paths ──────────────────────
    location ~ ^/(app|config|vendor|sql|migrations|\.env|\.git) {
        deny all;
        return 404;
    }

    # ── Static asset caching ──────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Upload limits ─────────────────────────────────────────
    client_max_body_size 55M;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;
    gzip_min_length 1000;
}

# ── Redirect www to non-www ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.newtonjee.com;
    ssl_certificate     /etc/letsencrypt/live/newtonjee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newtonjee.com/privkey.pem;
    return 301 https://newtonjee.com$request_uri;
}
